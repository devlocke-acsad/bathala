<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><%= htmlWebpackPlugin.options.title %></title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2c3e50;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        
        #ui-container {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(52, 73, 94, 0.9);
            padding: 0;
            border-radius: 8px;
            color: white;
            z-index: 1000;
            min-width: 250px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.18);
            user-select: none;
        }

        #ui-header {
            cursor: move;
            background: #34495e;
            border-radius: 8px 8px 0 0;
            padding: 8px 15px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #collapse-btn {
            background: none;
            border: none;
            color: #ecf0f1;
            font-size: 18px;
            cursor: pointer;
            margin-left: 8px;
            padding: 0 4px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        #collapse-btn:hover {
            background: #2c3e50;
        }

        #ui-content {
            padding: 15px;
        }
        
        .control-group {
            margin-bottom: 10px;
        }
        
        .control-group label {
            display: inline-block;
            width: 100px;
            font-size: 14px;
        }
        
        .control-group input[type="number"] {
            width: 60px;
            padding: 4px;
            border: 1px solid #7f8c8d;
            border-radius: 4px;
        }
        
        .control-group input[type="checkbox"] {
            margin-right: 8px;
        }
        
        .control-group button {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
            width: 100%;
        }
        
        .control-group button:hover {
            background: #2980b9;
        }
        
        .control-group button:disabled {
            background: #7f8c8d;
            cursor: not-allowed;
        }
        
        .legend {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #7f8c8d;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            margin: 5px 0;
            font-size: 12px;
        }
        
        .legend-color {
            width: 16px;
            height: 16px;
            margin-right: 8px;
            border: 1px solid #7f8c8d;
        }
        
        .info {
            margin-top: 10px;
            font-size: 12px;
            color: #bdc3c7;
        }
    </style>
</head>
<body>
    <div id="ui-container">
        <div id="ui-header">
            <span>Level Generator Menu</span>
            <button id="collapse-btn" title="Collapse/Expand Menu">&#x25B2;</button>
        </div>
        <div id="ui-content">
        
    <div class="control-group">
            <label for="width">Width:</label>
            <input type="number" id="width" min="10" max="100" value="30">
        </div>
        
        <div class="control-group">
            <label for="height">Height:</label>
            <input type="number" id="height" min="10" max="100" value="20">
        </div>
        
        <div class="control-group">
            <label for="regions">Regions:</label>
            <input type="number" id="regions" min="3" max="30" value="8">
        </div>
        
        <div class="control-group">
            <label for="distance">Min Distance:</label>
            <input type="number" id="distance" min="1" max="10" value="3">
        </div>
        
        <div class="control-group">
            <label for="culling">
                <input type="checkbox" id="culling" checked> Viewport Culling
            </label>
        </div>
        
        <div class="control-group">
            <button id="generate-btn">Generate Level</button>
        </div>
        
        <div class="legend">
            <div class="legend-item">
                <div class="legend-color" style="background-color: #90EE90;"></div>
                <span>Path</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: #8B4513;"></div>
                <span>Region</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: #F0F0F0;"></div>
                <span>Empty</span>
            </div>
        </div>
        
    <div class="info" id="info-text">
            Click 'Generate Level' to create a new layout
        </div>
        </div>
    </div>

    <div id="game-container"></div>
    <script>
    // --- Collapsible and Draggable Menu ---
    (function() {
        const uiContainer = document.getElementById('ui-container');
        const uiHeader = document.getElementById('ui-header');
        const uiContent = document.getElementById('ui-content');
        const collapseBtn = document.getElementById('collapse-btn');
        let collapsed = false;

        // Collapse/expand logic
        collapseBtn.addEventListener('click', function() {
            collapsed = !collapsed;
            if (collapsed) {
                uiContent.style.display = 'none';
                collapseBtn.innerHTML = '&#x25BC;';
                collapseBtn.title = 'Expand Menu';
            } else {
                uiContent.style.display = '';
                collapseBtn.innerHTML = '&#x25B2;';
                collapseBtn.title = 'Collapse Menu';
            }
        });

        // Drag logic
        let isDragging = false;
        let dragOffsetX = 0;
        let dragOffsetY = 0;

        uiHeader.addEventListener('mousedown', function(e) {
            isDragging = true;
            dragOffsetX = e.clientX - uiContainer.offsetLeft;
            dragOffsetY = e.clientY - uiContainer.offsetTop;
            document.body.style.userSelect = 'none';
        });

        document.addEventListener('mousemove', function(e) {
            if (!isDragging) return;
            let newX = e.clientX - dragOffsetX;
            let newY = e.clientY - dragOffsetY;
            // Clamp to viewport
            newX = Math.max(0, Math.min(window.innerWidth - uiContainer.offsetWidth, newX));
            newY = Math.max(0, Math.min(window.innerHeight - uiContainer.offsetHeight, newY));
            uiContainer.style.left = newX + 'px';
            uiContainer.style.top = newY + 'px';
        });

        document.addEventListener('mouseup', function() {
            isDragging = false;
            document.body.style.userSelect = '';
        });
    })();
    </script>
</body>
</html>
